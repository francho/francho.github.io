<svg width="600" height="600" viewBox="0 0 1600 1200" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grid fino -->
    <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8fd3ff" stroke-width="0.5" opacity="0.25"/>
    </pattern>

    <!-- Grid principal -->
    <pattern id="grid" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="url(#smallGrid)"/>
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#c9ecff" stroke-width="1" opacity="0.45"/>
    </pattern>

    <!-- Glow suave -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo azul semitransparente -->
  <rect width="1600" height="1200" fill="#1745ba" opacity="0.2"/>

  <!-- Fondo transparente -->
  <rect width="1600" height="1200" fill="url(#grid)"/>

  <!-- Líneas diagonales blueprint -->
  <g opacity="0.08">
    <path d="M0 200 L1600 1000" stroke="#8fd3ff" stroke-width="2"/>
    <path d="M0 500 L1200 1200" stroke="#8fd3ff" stroke-width="2"/>
    <path d="M300 0 L1600 900" stroke="#8fd3ff" stroke-width="2"/>
  </g>

  <!-- Anillos concéntricos style tapete de corte -->
  <g fill="none" stroke="#8fd3ff" stroke-width="1.2" opacity="0.14">
    <circle cx="380" cy="280" r="100"/>
    <circle cx="380" cy="280" r="140"/>
    <circle cx="380" cy="280" r="180"/>

    <circle cx="1160" cy="260" r="55"/>
    <circle cx="1160" cy="260" r="90"/>
    <circle cx="1160" cy="260" r="125"/>

    <circle cx="900" cy="760" r="90"/>
    <circle cx="900" cy="760" r="135"/>
    <circle cx="900" cy="760" r="180"/>

    <circle cx="320" cy="920" r="60"/>
    <circle cx="320" cy="920" r="95"/>
    <circle cx="320" cy="920" r="130"/>
  </g>

  <!-- Marcas laterales -->
  <g stroke="#d7f4ff" stroke-width="1" opacity="0.45">
    <!-- Horizontales -->
    <path d="M0 100 H25"/>
    <path d="M0 200 H25"/>
    <path d="M0 300 H25"/>
    <path d="M0 400 H25"/>
    <path d="M0 500 H25"/>
    <path d="M0 600 H25"/>
    <path d="M0 700 H25"/>
    <path d="M0 800 H25"/>
    <path d="M0 900 H25"/>
    <path d="M0 1000 H25"/>
    <path d="M0 1100 H25"/>

    <path d="M1575 100 H1600"/>
    <path d="M1575 200 H1600"/>
    <path d="M1575 300 H1600"/>
    <path d="M1575 400 H1600"/>
    <path d="M1575 500 H1600"/>
    <path d="M1575 600 H1600"/>
    <path d="M1575 700 H1600"/>
    <path d="M1575 800 H1600"/>
    <path d="M1575 900 H1600"/>
    <path d="M1575 1000 H1600"/>
    <path d="M1575 1100 H1600"/>

    <!-- Verticales -->
    <path d="M100 0 V25"/>
    <path d="M200 0 V25"/>
    <path d="M300 0 V25"/>
    <path d="M400 0 V25"/>
    <path d="M500 0 V25"/>
    <path d="M600 0 V25"/>
    <path d="M700 0 V25"/>
    <path d="M800 0 V25"/>
    <path d="M900 0 V25"/>
    <path d="M1000 0 V25"/>
    <path d="M1100 0 V25"/>
    <path d="M1200 0 V25"/>
    <path d="M1300 0 V25"/>
    <path d="M1400 0 V25"/>
    <path d="M1500 0 V25"/>
  </g>
</svg>